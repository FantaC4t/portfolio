<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluid Simulation</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { position: fixed; overflow: hidden; background: #000; }
    canvas { width: 100%; height: 100%; }
    .promo { display: none !important; }
  </style>
</head>
<body>
  <canvas></canvas>

  <!-- Stub elements fluid.js references — kept hidden -->
  <div class="promo">
    <div class="promo-close"></div>
    <a id="apple_link"></a>
    <a id="google_link"></a>
  </div>

  <!-- No-op ga stub so analytics calls don't throw -->
  <script>function ga() {}</script>

  <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
  <script src="fluid.js"></script>
  <script>
    splatStack.push(parseInt(Math.random() * 5) + 3);
    setInterval(() => splatStack.push(1), 1500);

    // Capture phase — runs before fluid.js's own mousemove listener.
    // Just marks the pointer as down so fluid.js's handler stops bailing out.
    // updatePointerMoveData is intentionally NOT called here to avoid zeroing the delta.
    canvas.addEventListener('mousemove', e => {
      const pointer = pointers[0];
      if (!pointer.down) {
        const posX = scaleByPixelRatio(e.offsetX);
        const posY = scaleByPixelRatio(e.offsetY);
        updatePointerDownData(pointer, -1, posX, posY);
      }
    }, true);

    canvas.addEventListener('mouseleave', () => updatePointerUpData(pointers[0]));
  </script>
</body>
</html>
